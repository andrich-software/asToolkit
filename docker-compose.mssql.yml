name: astoolkit-mssql

# Alternate stack — MSSQL backend instead of postgres.
# Bring up with:  docker compose -f docker-compose.mssql.yml up -d
# Add WASM:       docker compose -f docker-compose.mssql.yml --profile wasm up -d
#
# This file is self-contained (no .env auto-loading via cli.sh). ASTOOLKIT_SERVER_PORT
# and ASTOOLKIT_RESTRICT_SERVER_URL are read from the shell environment if set.

services:
  server:
    image: ${DOCKER_REGISTRY-}astoolkit/server
    build:
      context: .
      dockerfile: src/asToolkit.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=MSSQL
      - DatabaseConfig__ConnectionString=Server=mssql;Database=astoolkit_01;User Id=astoolkit;Password=astoolkit123!;TrustServerCertificate=True;
      - Logging__LogLevel__Default=Warning
    ports:
      - "${ASTOOLKIT_SERVER_PORT:-8443}:8443"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "SqlServer123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - astoolkit-mssql-data:/var/opt/mssql
      - ./scripts/mssql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups/mssql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P SqlServer123! -Q 'SELECT 1' || exit 1"]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 60s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}astoolkit/wasm
    build:
      context: .
      dockerfile: src/asToolkit.Client/Dockerfile
    environment:
      - ASTOOLKIT_RESTRICT_SERVER_URL=${ASTOOLKIT_RESTRICT_SERVER_URL:-}
    ports:
      - "${ASTOOLKIT_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  astoolkit-mssql-data:

networks:
  backend:
    driver: bridge
