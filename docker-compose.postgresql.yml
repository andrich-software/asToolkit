name: astoolkit-postgresql

# Alternate stack — PostgreSQL backend with the legacy 'astoolkit_01' database
# name (kept for parity with the other engine-specific compose files).
# For the canonical postgres setup, use docker-compose.yml together with
# ./cli.sh which supports both internal and external postgres.
#
# Bring up with:  docker compose -f docker-compose.postgresql.yml up -d
# Add WASM:       docker compose -f docker-compose.postgresql.yml --profile wasm up -d

services:
  server:
    image: ${DOCKER_REGISTRY-}astoolkit/server
    build:
      context: .
      dockerfile: src/asToolkit.Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8443
      - DatabaseConfig__Provider=PostgreSQL
      - DatabaseConfig__ConnectionString=Host=postgresql;Port=5432;Database=astoolkit_01;Username=astoolkit;Password=astoolkit;
      - Logging__LogLevel__Default=Warning
    ports:
      - "${ASTOOLKIT_SERVER_PORT:-8443}:8443"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astoolkit_01
      POSTGRES_USER: astoolkit
      POSTGRES_PASSWORD: astoolkit
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - astoolkit-postgresql-data:/var/lib/postgresql/data
      - ./backups/postgresql:/backups
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astoolkit -d astoolkit_01"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  wasm:
    profiles: ["wasm"]
    image: ${DOCKER_REGISTRY-}astoolkit/wasm
    build:
      context: .
      dockerfile: src/asToolkit.Client/Dockerfile
    environment:
      - ASTOOLKIT_RESTRICT_SERVER_URL=${ASTOOLKIT_RESTRICT_SERVER_URL:-}
    ports:
      - "${ASTOOLKIT_WASM_PORT:-8444}:80"
    networks:
      - backend
    restart: unless-stopped

volumes:
  astoolkit-postgresql-data:

networks:
  backend:
    driver: bridge
